<!--
  ============================================================================
  MECHANISM OF ACTION  —  Interactive Anatomical Panel
  ============================================================================
  Drop-in replacement for the "Pharmacokinetic Profile" panel.

  LAYOUT
  ------
  Desktop / tablet : two columns inside the panel —
        · left  : the supplied anatomical illustration with four numbered
                  hotspot markers placed AROUND it, joined to the anatomy
                  by thin leader lines + a glowing anchor.
        · right : a detail card that updates as a hotspot is hovered or
                  clicked. The card never overlaps the illustration, so the
                  anatomy it describes always stays visible.
  Mobile (<760px)  : illustration on top, hotspots become a tap accordion.

  HOW TO INTEGRATE
  ----------------
  1. Copy the <style> block into your global stylesheet (or leave it here).
  2. Copy the <section class="moa-panel"> markup where the PK panel sits.
  3. Copy the <script> block. Dependency-free vanilla JS.
  4. The anatomical illustration is EMBEDDED in this file as a base64
     WebP data URI (no external image file needed). To swap the art,
     replace the data URI in the <img src> marked  >>> EDIT  below.

  EDITABLE REGIONS are marked  >>> EDIT.  All hotspot copy + coordinates
  live in the HOTSPOT_DATA array inside the <script> — single source of
  truth for content and positioning.
  ============================================================================
-->

<!-- =============================== STYLES ============================== -->
<style>
  /* ---- Design tokens : matched to the existing pharma site ---------- */
  .moa-panel {
    /* >>> EDIT: palette — mirrors the live site */
    --moa-pink:        #D81B60;   /* accent / micro-heading / markers   */
    --moa-pink-soft:   #F4C9D8;   /* outer panel border                 */
    --moa-pink-border: #EBB9CC;   /* detail-card + hotspot border       */
    --moa-pink-tint:   #FCEFF3;   /* faint pink wash                    */
    --moa-ink:         #2A2A2A;   /* primary headings                   */
    --moa-muted:       #6F5B5B;   /* body copy                          */
    --moa-muted-2:     #8A7B7B;   /* italic annotation                  */
    --moa-bg:          #F8F6F6;   /* soft panel fill                    */
    --moa-card-bg:     #FFFFFF;   /* detail-card background             */
    --moa-hair:        #F1E6EA;   /* hairline divider                   */

    --moa-radius-lg:   22px;      /* outer panel                        */
    --moa-radius-md:   16px;      /* detail card                        */
    --moa-radius-sm:   12px;

    --moa-shadow-card: 0 8px 30px rgba(42,42,42,.10),
                       0 2px 6px  rgba(42,42,42,.05);
    --moa-shadow-soft: 0 2px 12px rgba(42,42,42,.07);

    --moa-ease: cubic-bezier(.22,.61,.36,1);

    /* >>> EDIT: change if the asset path differs */
    --moa-illustration: url('moa-illustration.png');

    /* font stack — Inter / SF Pro / Avenir Next family, matches site */
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text',
                 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;

    box-sizing: border-box;
    background: var(--moa-bg);
    border: 1px solid var(--moa-pink-soft);
    border-radius: var(--moa-radius-lg);
    padding: 28px 32px 30px;
    color: var(--moa-ink);
    position: relative;
  }
  .moa-panel *, .moa-panel *::before, .moa-panel *::after {
    box-sizing: border-box;
  }

  /* ---- Section micro-heading --------------------------------------- */
  .moa-eyebrow {
    margin: 0 0 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--moa-pink);
  }
  .moa-eyebrow sup {
    font-size: .62em;
    font-weight: 600;
    letter-spacing: 0;
    position: relative;
    top: -.55em;
    margin-left: 1px;
  }

  /* ---- Two-column body --------------------------------------------- */
  /* >>> EDIT: column weighting. The left (illustration) column is the
     hero (~58%); the insight panel (~42%) is centred against the
     illustration's mass rather than stretched to its full height.    */
  .moa-body {
    display: grid;
    grid-template-columns: minmax(0, 1.38fr) minmax(0, 1fr);
    gap: 22px;
    align-items: center;
  }

  /* =================  COLUMN 1 — illustration stage  ================= */
  .moa-stage {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;   /* centre the figure in the column */
  }
  /* The illustration is the hero. >>> EDIT: max-width controls how
     large it grows; the padding reserves narrow gutters for the
     markers, which now sit close to the anatomy.                     */
  .moa-figwrap {
    position: relative;
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    padding: 0 8.5%;
  }
  .moa-figure {
    position: relative;
    width: 100%;
    margin: 0 auto;
    aspect-ratio: 1400 / 1645;
    overflow: visible;
  }
  /* the hero illustration — kept crisp, never re-rasterised by us */
  .moa-illustration {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    -webkit-user-drag: none;
    user-select: none;
    z-index: 1;
  }
  /* SVG overlay exactly covers the illustration; its viewBox is the
     image's natural pixel space (1400 x 1875). Markers placed beyond
     that range sit in the side gutters — overflow is visible.        */
  .moa-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    overflow: visible;
    pointer-events: none;
  }
  .moa-overlay .hit { pointer-events: auto; cursor: pointer; }

  /* ---- Animated highlight layers (tissue effects) ------------------ */
  .moa-fx { opacity: 0; transition: opacity .30s var(--moa-ease); }
  .moa-fxgroup.is-active .moa-fx { opacity: 1; }

  .moa-glow { transform-origin: center; transform-box: fill-box; }
  .moa-fxgroup.is-active .moa-glow {
    animation: moaPulse 2.4s var(--moa-ease) infinite;
  }
  @keyframes moaPulse {
    0%,100% { opacity: .65; transform: scale(1);    }
    50%     { opacity: .22; transform: scale(1.16); }
  }
  /* gland-region contraction — reads as the gland shrinking */
  .moa-shrink { transition: transform .34s var(--moa-ease);
                transform-box: fill-box; }
  .moa-fxgroup.is-active .moa-shrink { transform: scale(.8); }
  /* fading particles (oil droplets / cytokines / bacteria) */
  .moa-particle { transition: opacity .32s var(--moa-ease); }
  .moa-fxgroup.is-active .moa-particle { opacity: 0 !important; }

  /* ---- Leader line + anatomical anchor ----------------------------- */
  .moa-leader {
    stroke: var(--moa-pink);
    stroke-width: 4;
    stroke-dasharray: 11 9;
    opacity: 0;
    transition: opacity .22s var(--moa-ease);
  }
  .moa-anchor-dot {
    fill: var(--moa-pink);
    opacity: 0;
    transition: opacity .22s var(--moa-ease);
  }
  .moa-anchor-ring {
    fill: none;
    stroke: var(--moa-pink);
    stroke-width: 3.5;
    opacity: 0;
    transform-origin: center;
    transform-box: fill-box;
  }
  .moa-hotspot.is-active .moa-anchor-ring {
    opacity: 1;
    animation: moaAnchor 2.4s var(--moa-ease) infinite;
  }
  @keyframes moaAnchor {
    0%   { opacity: .7; transform: scale(.4); }
    70%,100% { opacity: 0; transform: scale(1.8); }
  }

  /* ---- Numbered markers -------------------------------------------- */
  .moa-marker-ring {
    fill: var(--moa-card-bg);
    stroke: var(--moa-pink);
    stroke-width: 6;
    filter: drop-shadow(0 7px 14px rgba(216,27,96,.28));
    transition: transform .22s var(--moa-ease);
    transform-origin: center;
    transform-box: fill-box;
  }
  .moa-marker-num {
    fill: var(--moa-pink);
    font-size: 52px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: central;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .moa-hotspot:hover  .moa-marker-ring,
  .moa-hotspot:focus-visible .moa-marker-ring,
  .moa-hotspot.is-active .moa-marker-ring { transform: scale(1.14); }
  .moa-hotspot:hover  .moa-leader,
  .moa-hotspot:focus-visible .moa-leader,
  .moa-hotspot.is-active .moa-leader  { opacity: .8; }
  .moa-hotspot:hover  .moa-anchor-dot,
  .moa-hotspot:focus-visible .moa-anchor-dot,
  .moa-hotspot.is-active .moa-anchor-dot { opacity: 1; }

  /* a filled marker for the currently locked hotspot */
  .moa-hotspot.is-active .moa-marker-ring { fill: var(--moa-pink); }
  .moa-hotspot.is-active .moa-marker-num  { fill: #FFFFFF; }

  .moa-hotspot .hit:focus-visible { outline: none; }
  .moa-hotspot:focus-visible .moa-marker-ring {
    filter: drop-shadow(0 0 0 3px rgba(216,27,96,.30));
  }

  /* =================  COLUMN 2 — detail card  =======================
     The card is a contextual insight module: it sizes to its own
     content (the idle list / active detail) and is centred against the
     illustration — it does NOT stretch to the section's full height. */
  .moa-detail {
    position: relative;
    background: var(--moa-card-bg);
    border: 1px solid var(--moa-pink-border);
    border-radius: var(--moa-radius-md);
    box-shadow: var(--moa-shadow-soft);
    padding: 24px 24px 22px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* thin accent rail down the left edge of the card */
  .moa-detail::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--moa-pink);
    opacity: .9;
  }

  /* -- idle prompt (shown before any hotspot is chosen) -- */
  .moa-detail-idle {
    margin: auto 0;
    transition: opacity .22s var(--moa-ease);
  }
  .moa-idle-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--moa-pink);
    margin: 0 0 10px;
  }
  .moa-idle-title {
    font-size: 19px;
    line-height: 1.35;
    font-weight: 700;
    color: var(--moa-ink);
    margin: 0 0 11px;
    letter-spacing: -.01em;
  }
  .moa-idle-text {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--moa-muted);
    margin: 0 0 20px;
  }
  /* compact list of the four mechanisms in the idle state */
  .moa-idle-list { display: flex; flex-direction: column; gap: 4px; }
  .moa-idle-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 7px;
    border-radius: var(--moa-radius-sm);
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    transition: background .18s var(--moa-ease);
  }
  .moa-idle-item:hover,
  .moa-idle-item:focus-visible {
    background: var(--moa-pink-tint);
    outline: none;
  }
  .moa-idle-badge {
    flex: none;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--moa-pink);
    color: var(--moa-pink);
    font-size: 11.5px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-variant-numeric: tabular-nums;
  }
  .moa-idle-label {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--moa-ink);
  }
  .moa-idle-arrow {
    margin-left: auto;
    color: var(--moa-pink);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity .18s var(--moa-ease),
                transform .18s var(--moa-ease);
  }
  .moa-idle-item:hover .moa-idle-arrow,
  .moa-idle-item:focus-visible .moa-idle-arrow {
    opacity: 1; transform: translateX(0);
  }

  /* -- active content (one hotspot's full detail) -- */
  .moa-detail-content {
    position: absolute;
    inset: 0;
    padding: 24px 24px 22px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    /* the container itself stays pointer-transparent so hovering over
       it never steals hover from the idle list beneath (which would
       cause an enter/leave flicker loop). Only the interactive
       children below opt back into pointer events.                   */
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity .26s var(--moa-ease),
                transform .26s var(--moa-ease),
                visibility 0s linear .26s;
  }
  .moa-detail.is-active .moa-detail-content {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition: opacity .26s var(--moa-ease),
                transform .26s var(--moa-ease), visibility 0s;
  }
  /* only these opt back into pointer events */
  .moa-detail.is-active .moa-dc-nav,
  .moa-detail.is-active .moa-dc-dot,
  .moa-detail.is-active .moa-dc-reset { pointer-events: auto; }

  .moa-detail.is-active .moa-detail-idle {
    opacity: 0;
    pointer-events: none;
  }
  /* the text block is vertically centred in the available space */
  .moa-dc-main { margin: auto 0; }

  /* -- staggered reveal: when a hotspot activates, the card's content
     elements fade-and-rise in sequence for a dynamic, deliberate feel. */
  .moa-dc-kicker,
  .moa-dc-title,
  .moa-dc-body,
  .moa-dc-note {
    opacity: 0;
    transform: translateY(7px);
  }
  .moa-detail.is-active .moa-dc-kicker,
  .moa-detail.is-active .moa-dc-title,
  .moa-detail.is-active .moa-dc-body,
  .moa-detail.is-active .moa-dc-note {
    animation: moaReveal .42s var(--moa-ease) forwards;
  }
  .moa-detail.is-active .moa-dc-kicker { animation-delay: .04s; }
  .moa-detail.is-active .moa-dc-title  { animation-delay: .11s; }
  .moa-detail.is-active .moa-dc-body   { animation-delay: .18s; }
  .moa-detail.is-active .moa-dc-note   { animation-delay: .25s; }
  @keyframes moaReveal {
    to { opacity: 1; transform: translateY(0); }
  }

  .moa-dc-kicker {
    display: flex;
    align-items: center;
    gap: 9px;
    margin: 0 0 12px;
  }
  .moa-dc-num {
    flex: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--moa-pink);
    color: #FFFFFF;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-variant-numeric: tabular-nums;
  }
  .moa-dc-kicker-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .045em;
    text-transform: uppercase;
    color: var(--moa-muted);
  }
  .moa-dc-title {
    margin: 0 0 12px;
    font-size: 21px;
    line-height: 1.28;
    font-weight: 700;
    color: var(--moa-ink);
    letter-spacing: -.012em;
  }
  .moa-dc-body {
    margin: 0;
    font-size: 14px;
    line-height: 1.62;
    color: var(--moa-muted);
  }
  .moa-dc-note {
    margin: 16px 0 0;
    padding-top: 14px;
    border-top: 1px solid var(--moa-hair);
    font-size: 13px;
    line-height: 1.5;
    font-style: italic;
    color: var(--moa-muted-2);
  }
  /* navigation chips: jump between hotspots within the card */
  .moa-dc-nav {
    margin-top: auto;
    padding-top: 18px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .moa-dc-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    border: 1.5px solid var(--moa-pink);
    background: transparent;
    padding: 0;
    cursor: pointer;
    transition: background .18s var(--moa-ease),
                transform .18s var(--moa-ease);
  }
  .moa-dc-dot:hover { transform: scale(1.25); }
  .moa-dc-dot.is-on { background: var(--moa-pink); }
  .moa-dc-dot:focus-visible {
    outline: 2px solid var(--moa-pink);
    outline-offset: 2px;
  }
  .moa-dc-reset {
    margin-left: auto;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--moa-muted-2);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 7px;
    transition: color .18s var(--moa-ease),
                background .18s var(--moa-ease);
  }
  .moa-dc-reset:hover { color: var(--moa-pink); background: var(--moa-bg); }

  /* ---- Hint line under the illustration ---------------------------- */
  .moa-hint {
    margin: 18px auto 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: .02em;
    color: var(--moa-muted-2);
  }
  .moa-hint b { color: var(--moa-pink); font-weight: 600; }

  /* the mobile accordion is hidden on desktop / tablet; a media query
     below flips it to display:block under 760px. This base rule sits
     BEFORE that query so source order does not override it.          */
  .moa-accordion { display: none; }

  /* ===================  TABLET ( <= 1080px )  ======================= */
  @media (max-width: 1080px) {
    .moa-body { gap: 22px; }
    .moa-stage { padding: 0 6%; }
    .moa-dc-title  { font-size: 19px; }
    .moa-idle-title{ font-size: 17px; }
  }

  /* ===================  MOBILE ( <= 760px )  ========================
     Single column. Illustration on top; the detail column is replaced
     by a tap-accordion stacked beneath the figure.                   */
  @media (max-width: 760px) {
    .moa-panel { padding: 26px 18px 28px; }
    .moa-body  { grid-template-columns: 1fr; gap: 4px; }
    .moa-stage { padding: 0 14%; }
    .moa-detail { display: none; }          /* hide desktop detail card */

    .moa-accordion { display: block; margin-top: 22px; }
    .moa-acc-item {
      border: 1px solid var(--moa-pink-border);
      border-radius: var(--moa-radius-md);
      background: var(--moa-card-bg);
      margin-bottom: 11px;
      overflow: hidden;
      box-shadow: var(--moa-shadow-soft);
    }
    .moa-acc-head {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 15px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .moa-acc-badge {
      flex: none;
      width: 27px; height: 27px;
      border-radius: 50%;
      border: 1.5px solid var(--moa-pink);
      color: var(--moa-pink);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      font-variant-numeric: tabular-nums;
      transition: background .18s var(--moa-ease),
                  color .18s var(--moa-ease);
    }
    .moa-acc-item.is-open .moa-acc-badge {
      background: var(--moa-pink); color: #FFFFFF;
    }
    .moa-acc-titles {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 3px;
    }
    .moa-acc-kicker {
      display: block;
      font-size: 11px; font-weight: 600; letter-spacing: .04em;
      color: var(--moa-muted); text-transform: uppercase;
    }
    .moa-acc-title {
      display: block;
      font-size: 15px; font-weight: 700; color: var(--moa-ink);
      line-height: 1.3;
    }
    .moa-acc-chevron {
      flex: none; color: var(--moa-pink);
      transition: transform .25s var(--moa-ease);
    }
    .moa-acc-item.is-open .moa-acc-chevron { transform: rotate(180deg); }
    .moa-acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .30s var(--moa-ease);
    }
    .moa-acc-item.is-open .moa-acc-body { max-height: 340px; }
    .moa-acc-inner { padding: 2px 16px 16px 54px; }
    .moa-acc-body-text {
      font-size: 13.5px; line-height: 1.6; color: var(--moa-muted);
      margin: 0;
    }
    .moa-acc-note {
      font-size: 12.5px; font-style: italic; color: var(--moa-muted-2);
      padding-top: 11px; margin: 12px 0 0;
      border-top: 1px solid var(--moa-hair);
    }
    .moa-hint { display: none; }
  }

  /* small phones: the SVG scales down a lot at narrow widths, so marker
     geometry (set in viewBox units) must grow to stay legible. CSS
     geometry properties (r, stroke-width) override the JS attributes. */
  @media (max-width: 600px) {
    .moa-marker-num  { font-size: 104px; }
    .moa-marker-ring { r: 86px; stroke-width: 12; }
    .moa-anchor-dot  { r: 20px; }
    .moa-anchor-ring { r: 44px; stroke-width: 6; }
    .moa-leader      { stroke-width: 7; stroke-dasharray: 18 14; }
    .moa-hotspot .hit { r: 118px; }
    .moa-stage { padding: 0 14%; }
  }
  @media (max-width: 420px) {
    .moa-marker-num  { font-size: 124px; }
    .moa-marker-ring { r: 104px; stroke-width: 14; }
    .moa-anchor-dot  { r: 24px; }
    .moa-hotspot .hit { r: 140px; }
    .moa-stage { padding: 0 15%; }
  }

  /* ===================  REDUCED MOTION  ============================= */
  @media (prefers-reduced-motion: reduce) {
    .moa-panel *, .moa-panel *::before, .moa-panel *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .001ms !important;
    }
  }
</style>


<!-- =============================== MARKUP ============================== -->
<!-- >>> EDIT: place this where the Pharmacokinetic Profile panel was. -->
<section class="moa-panel" aria-labelledby="moa-heading">

  <h2 class="moa-eyebrow" id="moa-heading">
    Mechanism of Action<sup aria-hidden="true">7</sup>
  </h2>

  <div class="moa-body">

    <!-- ===== COLUMN 1 : interactive illustration ===================== -->
    <div>
      <div class="moa-stage" id="moaStage">
        <div class="moa-figwrap">
          <div class="moa-figure">
            <!-- HERO: the anatomical illustration, kept crisp.
                 >>> EDIT: the image is embedded below as a base64 WebP
                 data URI so this file is fully self-contained. To swap
                 the artwork, replace the entire src="data:image/webp..."

    {
      id: 2,
      kicker: 'Follicular Keratinisation',
      title:  'Normalises cell turnover',
      body:   'Inhibits keratinocyte hyperproliferation \u2192 reduces ' +
              'ductal hyperkeratinisation \u2192 prevents microcomedone ' +
              'formation.',
      note:   'Clears blockage at its earliest stage',
      ax: 0.432, ay: 0.094,            /* follicular canal / surface opening */
      mx: -96,   my: 95,               /* left gutter, upper */
      glow: 122, tint: 'pink', shrink: false,
      dots: [[-16,-20,22], [18,22,16], [-2,2,13]],
      dotColor: '#C58A6A'
    },
    {
      id: 3,
      kicker: 'Anti-inflammatory Action',
      title:  'Cytokine & neutrophil modulation',
      body:   'Suppresses IL-1\u03B1, TNF-\u03B1 and MMPs \u2014 inhibits ' +
              'neutrophil chemotaxis and degranulation.',
      note:   'Fewer inflamed lesions, reduced scarring',
      ax: 0.350, ay: 0.350,            /* perifollicular tissue / follicle wall */
      mx: -96,   my: 760,              /* left gutter, lower */
      glow: 160, tint: 'calm', shrink: false,
      dots: [[-52,-50,10], [48,-26,9], [-18,60,10], [52,46,8], [10,-8,9]],
      dotColor: '#E5484D'
    },
    {
      id: 4,
      kicker: 'Indirect Antimicrobial Effect',
      title:  'Indirect bacterial suppression',
      body:   'Sebum depletion and an altered follicular microenvironment ' +
              'reduce bacterial proliferation.',
      note:   'Reduced bacterial load without resistance risk',
      ax: 0.520, ay: 0.310,            /* follicular duct / sebum region */
      mx: 1496,  my: 175,              /* right gutter, upper */
      glow: 130, tint: 'pink', shrink: false,
      bacteria: [[-34,-30,28], [36,4,-18], [-10,46,12]],
      dotColor: '#9B7B53'
    }
  ];

  /* ---- build the SVG markup for one hotspot's highlight effect ------- */
  function buildFx(d) {
    var cx = figX(d.ax), cy = figY(d.ay);
    var grad = (d.tint === 'calm') ? 'moaCalmGrad' : 'moaGlowGrad';
    var s = '<circle class="moa-fx moa-glow" cx="' + cx + '" cy="' + cy +
            '" r="' + d.glow + '" fill="url(#' + grad + ')"/>';

    if (d.dots) {                       /* round particles */
      var cls = 'moa-fx moa-particle' + (d.shrink ? ' moa-shrink' : '');
      var inner = d.dots.map(function (p) {
        return '<circle cx="' + (cx + p[0]) + '" cy="' + (cy + p[1]) +
               '" r="' + p[2] + '" fill="' + d.dotColor +
               '" opacity=".72"/>';
      }).join('');
      s += '<g class="' + cls + '" style="transform-origin:' +
           cx + 'px ' + cy + 'px">' + inner + '</g>';
    }
    if (d.bacteria) {                   /* rod particles */
      var rods = d.bacteria.map(function (p) {
        var bx = cx + p[0], by = cy + p[1];
        return '<ellipse cx="' + bx + '" cy="' + by +
               '" rx="11" ry="6" fill="' + d.dotColor +
               '" opacity=".72" transform="rotate(' + p[2] + ' ' +
               bx + ' ' + by + ')"/>';
      }).join('');
      s += '<g class="moa-fx moa-particle">' + rods + '</g>';
    }
    return s;
  }

  /* ---- element refs --------------------------------------------------- */
  var stage     = document.getElementById('moaStage');
  if (!stage) return;
  var hotsLayer = document.getElementById('moaHotspots');
  var fxLayer   = document.getElementById('moaFx');
  var detail    = document.getElementById('moaDetail');
  var idleList  = document.getElementById('moaIdleList');
  var content   = document.getElementById('moaContent');
  var accordion = document.getElementById('moaAccordion');
  var hintEl    = document.getElementById('moaHint');
  var dcNum     = document.getElementById('moaDcNum');
  var dcKicker  = document.getElementById('moaDcKicker');
  var dcTitle   = document.getElementById('moaDcTitle');
  var dcBody    = document.getElementById('moaDcBody');
  var dcNote    = document.getElementById('moaDcNote');
  var dcDots    = document.getElementById('moaDcDots');
  var dcReset   = document.getElementById('moaDcReset');

  var SVGNS = 'http://www.w3.org/2000/svg';
  var activeId = null;   // hotspot currently shown in the detail card
  var lockedId = null;   // hotspot click-locked (survives mouseleave)

  function svg(tag, attrs) {
    var el = document.createElementNS(SVGNS, tag);
    for (var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }
  function dataById(id) {
    for (var i = 0; i < HOTSPOT_DATA.length; i++)
      if (HOTSPOT_DATA[i].id === id) return HOTSPOT_DATA[i];
    return null;
  }

  /* ---- build SVG hotspots (effect + leader + marker) ----------------- */
  HOTSPOT_DATA.forEach(function (d) {
    var ax = figX(d.ax), ay = figY(d.ay);
    var mx = d.mx, my = d.my;

    /* highlight effect, clipped to the illustration */
    var fx = svg('g', { 'class': 'moa-fxgroup', 'data-id': d.id });
    fx.innerHTML = buildFx(d);
    fxLayer.appendChild(fx);

    /* marker group */
    var g = svg('g', { 'class': 'moa-hotspot', 'data-id': d.id });

    g.appendChild(svg('line', {
      'class': 'moa-leader', x1: mx, y1: my, x2: ax, y2: ay
    }));
    g.appendChild(svg('circle', {
      'class': 'moa-anchor-ring', cx: ax, cy: ay, r: 22
    }));
    g.appendChild(svg('circle', {
      'class': 'moa-anchor-dot', cx: ax, cy: ay, r: 10
    }));
    g.appendChild(svg('circle', {
      'class': 'moa-marker-ring', cx: mx, cy: my, r: 42
    }));
    var num = svg('text', { 'class': 'moa-marker-num', x: mx, y: my });
    num.textContent = ('0' + d.id);
    g.appendChild(num);

    /* generous transparent hit target — pointer + keyboard */
    var hit = svg('circle', {
      'class': 'hit', cx: mx, cy: my, r: 58,
      fill: 'transparent', tabindex: '0', role: 'button',
      'aria-label': 'Mechanism ' + d.id + ': ' + d.kicker + '. ' +
                    d.title + '. ' + d.body + ' ' + d.note
    });
    g.appendChild(hit);

    hit.addEventListener('mouseenter', function () {
      if (lockedId === null) show(d.id, false);
    });
    hit.addEventListener('mouseleave', function () {
      if (lockedId === null) clear();
    });
    hit.addEventListener('focus', function () {
      if (lockedId === null) show(d.id, false);
    });
    hit.addEventListener('blur', function () {
      if (lockedId === null) clear();
    });
    hit.addEventListener('click', function (e) {
      e.stopPropagation();
      if (lockedId === d.id) { lockedId = null; clear(); }
      else { lockedId = d.id; show(d.id, true); }
    });
    hit.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (lockedId === d.id) { lockedId = null; clear(); }
        else { lockedId = d.id; show(d.id, true); }
      } else if (e.key === 'Escape') {
        lockedId = null; clear();
      }
    });

    hotsLayer.appendChild(g);
  });

  /* ---- build the idle mechanism shortlist ---------------------------- */
  HOTSPOT_DATA.forEach(function (d) {
    var btn = document.createElement('button');
    btn.className = 'moa-idle-item';
    btn.type = 'button';
    btn.setAttribute('data-id', d.id);
    btn.innerHTML =
      '<span class="moa-idle-badge">' + ('0' + d.id) + '</span>' +
      '<span class="moa-idle-label">' + d.kicker + '</span>' +
      '<svg class="moa-idle-arrow" width="15" height="15" ' +
           'viewBox="0 0 16 16" fill="none" aria-hidden="true">' +
        '<path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" ' +
              'stroke-linecap="round" stroke-linejoin="round"/></svg>';
    /* Idle-list items respond to CLICK / Enter only. They are not
       hover- or focus-preview targets: activating one hides the idle
       list itself, which would cause flicker. Hover preview is the
       markers' job — markers stay visible when active.               */
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      lockedId = d.id; show(d.id, true);
    });
    idleList.appendChild(btn);
  });

  /* ---- build the in-card navigation dots ----------------------------- */
  HOTSPOT_DATA.forEach(function (d) {
    var dot = document.createElement('button');
    dot.className = 'moa-dc-dot';
    dot.type = 'button';
    dot.setAttribute('data-id', d.id);
    dot.setAttribute('aria-label', 'Show mechanism ' + d.id);
    dot.addEventListener('click', function (e) {
      e.stopPropagation();
      lockedId = d.id; show(d.id, true);
    });
    dcDots.appendChild(dot);
  });
  dcReset.addEventListener('click', function (e) {
    e.stopPropagation();
    lockedId = null; clear();
  });

  /* ---- build the mobile accordion ------------------------------------ */
  HOTSPOT_DATA.forEach(function (d) {
    var item = document.createElement('div');
    item.className = 'moa-acc-item';
    item.setAttribute('data-id', d.id);
    item.innerHTML =
      '<button class="moa-acc-head" aria-expanded="false">' +
        '<span class="moa-acc-badge">' + ('0' + d.id) + '</span>' +
        '<span class="moa-acc-titles">' +
          '<span class="moa-acc-kicker">' + d.kicker + '</span>' +
          '<span class="moa-acc-title">' + d.title + '</span>' +
        '</span>' +
        '<svg class="moa-acc-chevron" width="16" height="16" ' +
             'viewBox="0 0 16 16" fill="none" aria-hidden="true">' +
          '<path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" ' +
                'stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</button>' +
      '<div class="moa-acc-body">' +
        '<div class="moa-acc-inner">' +
          '<p class="moa-acc-body-text">' + d.body + '</p>' +
          '<p class="moa-acc-note">' + d.note + '</p>' +
        '</div>' +
      '</div>';
    item.querySelector('.moa-acc-head')
        .addEventListener('click', function () {
      var open = item.classList.contains('is-open');
      accordion.querySelectorAll('.moa-acc-item').forEach(function (it) {
        it.classList.remove('is-open');
        it.querySelector('.moa-acc-head')
          .setAttribute('aria-expanded', 'false');
      });
      if (!open) {
        item.classList.add('is-open');
        item.querySelector('.moa-acc-head')
            .setAttribute('aria-expanded', 'true');
        lockedId = d.id; paintFx(d.id);   /* sync the illustration glow */
      } else {
        lockedId = null; paintFx(null);
      }
    });
    accordion.appendChild(item);
  });

  /* ---- state painting ------------------------------------------------ */
  function fxGroup(id) {
    return fxLayer.querySelector('.moa-fxgroup[data-id="' + id + '"]');
  }
  function hotGroup(id) {
    return hotsLayer.querySelector('.moa-hotspot[data-id="' + id + '"]');
  }
  /* toggle the illustration highlight + marker active state */
  function paintFx(id) {
    HOTSPOT_DATA.forEach(function (d) {
      var on = (d.id === id);
      var fx = fxGroup(d.id), g = hotGroup(d.id);
      if (fx) fx.classList.toggle('is-active', on);
      if (g)  g.classList.toggle('is-active', on);
    });
  }

  /* show a hotspot in the detail card */
  function show(id, locked) {
    var d = dataById(id);
    if (!d) return;
    activeId = id;
    paintFx(id);

    dcNum.textContent    = ('0' + d.id);
    dcKicker.textContent = d.kicker;
    dcTitle.textContent  = d.title;
    dcBody.textContent   = d.body;
    dcNote.textContent   = d.note;
    detail.classList.add('is-active');

    /* retrigger the staggered content reveal — even when switching
       directly from one active hotspot to another (the .is-active
       class alone does not restart a CSS animation).               */
    var revealEls = content.querySelectorAll(
      '.moa-dc-kicker, .moa-dc-title, .moa-dc-body, .moa-dc-note');
    revealEls.forEach(function (el) { el.style.animation = 'none'; });
    /* force reflow so the browser registers the reset */
    void content.offsetWidth;
    revealEls.forEach(function (el) { el.style.animation = ''; });

    /* nav dots */
    dcDots.querySelectorAll('.moa-dc-dot').forEach(function (dot) {
      dot.classList.toggle('is-on',
        parseInt(dot.getAttribute('data-id'), 10) === id);
    });
    /* reset button only meaningful while locked */
    dcReset.style.visibility = locked ? 'visible' : 'hidden';

    if (hintEl) {
      hintEl.innerHTML = locked
        ? 'Showing <b>0' + id + '</b> &nbsp;&middot;&nbsp; ' +
          'click the marker again or press <b>Esc</b> to clear'
        : '<b>Hover</b> a marker to explore &nbsp;&middot;&nbsp; ' +
          '<b>click</b> to keep it open';
    }
  }

  /* return the detail card to its idle prompt */
  function clear() {
    activeId = null;
    paintFx(null);
    detail.classList.remove('is-active');
    if (hintEl) {
      hintEl.innerHTML =
        '<b>Hover</b> a marker to explore &nbsp;&middot;&nbsp; ' +
        '<b>click</b> to keep it open';
    }
  }

  /* click anywhere outside markers / detail card clears a lock */
  document.addEventListener('click', function (e) {
    if (lockedId !== null &&
        !e.target.closest('.moa-hotspot') &&
        !e.target.closest('.moa-detail') &&
        !e.target.closest('.moa-idle-item')) {
      lockedId = null; clear();
    }
  });

  /* start in the idle state */
  clear();

})();
</script>
